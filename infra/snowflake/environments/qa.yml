# infra/snowflake/dev.yml
# Configuração completa do schemachange para o ambiente DEV.

# ─────────────────────────────────────────────────────────────
# Root folder (onde estão os V*.sql), relativo a este YAML
# ─────────────────────────────────────────────────────────────
root-folder: "./infra/snowflake/migrations"

# ─────────────────────────────────────────────────────────────
# Histórico
# ─────────────────────────────────────────────────────────────
change-history-table: "METADATA.SCHEMACHANGE.CHANGE_HISTORY_QA"
create-change-history-table: true

# ─────────────────────────────────────────────────────────────
# Runtime
# ─────────────────────────────────────────────────────────────
autocommit: false
dry-run: false
verbose: false

# ─────────────────────────────────────────────────────────────
# Variáveis Jinja injetadas nas migrations
# ─────────────────────────────────────────────────────────────
vars:
  env: "qa"
  database_name: "ANALYTICS_QA"
  project_name: "event-driven-ecommerce-analytics"